[platformio]
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts =
  pre:scripts/inject-build-identity.py
  pre:scripts/guard-webserver-control-body.py
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
# Pin majors: unpinned deps let a CI rebuild of identical source pick up a
# breaking library major (FastLED has rewritten its ESP32 RMT driver across
# majors before). Bump deliberately, with a bench test.
lib_deps =
  fastled/FastLED@3.10.3
  bblanchon/ArduinoJson@7.4.3
  links2004/WebSockets@2.7.3
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLW_SD_CS=10
  -DLW_SPI_MOSI=11
  -DLW_SPI_SCK=12
  -DLW_SPI_MISO=13
  -DLW_MAX_PIXELS=1024
  -DLW_FIRMWARE_VERSION=\"1.0.0\"
  -DLW_CONFIG_SCHEMA_VERSION=1
  -DLW_CAPABILITIES_VERSION=1
  -DLW_WEB_CONTROL_MAX_BODY_BYTES=4096
  -DLW_WEB_CONFIG_MAX_BODY_BYTES=3968
  -DLW_WEB_CANDIDATE_MAX_BODY_BYTES=3982
  -DLW_WEB_WIFI_MAX_BODY_BYTES=512
  -DLW_WEB_WIFI_ACK_MAX_BODY_BYTES=128

[env:native-output-color-parser]
platform = native
test_framework = unity
test_filter = test_output_color_parser
test_build_src = true
build_src_filter =
  -<*>
  +<LightweaverOutputColorParser.cpp>
lib_deps =
  bblanchon/ArduinoJson@7.4.3
