<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandala Presets · Solo and Gathering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{min-height:100vh;background:radial-gradient(90% 70% at 50% 40%, #17110b 0%, #0a0806 70%, #060403 100%) fixed,#060403;
    color:#ece0cc;font-family:"Space Mono",monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 16px 40px;-webkit-font-smoothing:antialiased}
  .title{font-family:"Cormorant Garamond",serif;font-size:clamp(1.4rem,5vw,2rem);font-weight:500;margin-bottom:4px}
  .title em{font-style:italic;color:#c9a35f}
  .sub{font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;color:#6b5c48;margin-bottom:18px}
  .frame{position:relative;width:min(88vw,520px);aspect-ratio:1/1;border-radius:50%;
    background:radial-gradient(circle at 50% 44%, #1a120b 0%, #0d0906 78%, #070504 100%);
    box-shadow:0 40px 90px rgba(0,0,0,.6), inset 0 0 0 2px rgba(120,90,55,.25), inset 0 0 60px rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center}
  .frame::after{content:"";position:absolute;inset:-3%;border-radius:50%;
    background:conic-gradient(from 0deg,#2a1d12,#3a2817,#241a10,#3a2817,#2a1d12);z-index:-1;filter:blur(1px);opacity:.6}
  canvas{width:100%;height:100%;display:block;border-radius:50%}
  .foot{margin-top:20px;display:flex;flex-direction:column;gap:12px;align-items:center}
  .grp{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .lab{font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:#5e5142;width:100%;text-align:center;margin-bottom:-4px}
  button{font-family:"Space Mono",monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:#9a8a72;
    background:#140f0a;border:1px solid #271c12;border-radius:999px;padding:9px 15px;cursor:pointer;transition:all .18s}
  button:hover{color:#ece0cc;border-color:#3a2a1a}
  button.on{color:#1a120a;background:linear-gradient(180deg,#e0b063,#c9933f);border-color:#e0b063}
  .cap{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:#5e5142;margin-top:2px}
</style>
</head>
<body>
  <div class="title">The Lit <em>Mandala</em></div>
  <div class="sub">two presets · shared breath</div>
  <div class="frame"><canvas id="cv"></canvas></div>
  <div class="foot">
    <div class="grp"><span class="lab">Preset</span>
      <button id="pSolo" class="on">Solo late-night</button>
      <button id="pGather">Gathering</button>
    </div>
    <div class="grp">
      <button id="between">Between tracks</button>
    </div>
    <div class="cap" id="cap">solo · breathing</div>
  </div>

<script>
(function(){
  "use strict";
  const reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  function lerp(a,b,t){return a+(b-a)*t}
  function warm(i,bias){i=Math.min(1,Math.max(0,i*(bias||1)));
    const s=[[0,[30,12,6]],[.32,[150,52,20]],[.62,[202,112,42]],[.85,[244,200,105]],[1,[255,232,196]]];
    for(let k=1;k<s.length;k++){if(i<=s[k][0]){const a=s[k-1],b=s[k],f=(i-a[0])/(b[0]-a[0]);
      return [lerp(a[1][0],b[1][0],f),lerp(a[1][1],b[1][1],f),lerp(a[1][2],b[1][2],f)];}}return s[4][1];}
  const rgb=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
  function angWrap(d){while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return d;}
  const angG=(d,s)=>{d=angWrap(d);return Math.exp(-(d*d)/(2*s*s));};

  const rings=[
    {rf:0.00,sym:1, type:"core", size:0.070},{rf:0.17,sym:8, type:"dot",  size:0.034},
    {rf:0.33,sym:16,type:"petal",size:0.056},{rf:0.49,sym:16,type:"diamond",size:0.050},
    {rf:0.65,sym:24,type:"petal",size:0.050},{rf:0.81,sym:36,type:"dash", size:0.032}
  ];
  const R=rings.length, el=[];
  rings.forEach((rg,ri)=>{const off=(ri%2)?Math.PI/rg.sym:0;for(let k=0;k<rg.sym;k++)el.push({ri,rf:rg.rf,ang:k/rg.sym*Math.PI*2+off,type:rg.type,size:rg.size});});
  const NEL=el.length, vals=new Float32Array(NEL), target=new Float32Array(NEL), temp=new Float32Array(NEL).fill(1);

  const PRESETS={
    solo:  {name:"solo",  period:125, spiral:false, ceiling:0.82, atk:12, dec:2.0, bloomP:0.15, bloomA:0.5, shimP:0.25, shimA:0.5, ripple:false, tempBias:0.92},
    gather:{name:"gather",period:75,  spiral:true,  ceiling:1.0,  atk:14, dec:3.4, bloomP:0.5,  bloomA:0.7, shimP:0.55, shimA:0.7, ripple:true,  tempBias:1.06}
  };
  let P=PRESETS.solo, between=false;

  // internal track model with arrangement dynamics
  const beatDur=0.82; let mc=0,nextBeat=0,bi=0,chord=0,fluxV=0,events=[];
  let blooms=[],shimmers=[],ripples=[];
  const F={bass:0,mid:0,high:0,flux:0,energy:0,section:0,centroid:0};
  const arrLevel=t=>0.35+0.65*(0.5+0.5*Math.sin(t*2*Math.PI/34)); // builds and breakdowns
  function onBeat(b){
    const bar=Math.floor(b/4),inBar=b%4, arr=arrLevel(mc);
    if(inBar===0&&bar%2===0)chord=(bar/2)%4;
    if(inBar===0||inBar===2){const strong=inBar===0;events.push({start:mc,band:"bass",peak:(strong?0.62:0.42)*(0.4+arr*0.6),dur:strong?0.75:0.55});
      if(strong&&Math.random()<P.bloomP*arr)blooms.push({born:mc,amp:P.bloomA*(0.6+arr*0.4)});
      if(strong&&P.ripple&&Math.random()<0.5*arr)ripples.push({born:mc,amp:0.5*arr});}
    if(Math.random()<0.5*arr){events.push({start:mc,band:"mid",peak:0.4,dur:0.5});fluxV=Math.min(1,fluxV+0.4);}
    if(Math.random()<0.4*arr){events.push({start:mc,band:"high",peak:0.5,dur:0.18});fluxV=Math.min(1,fluxV+0.35);
      if(Math.random()<P.shimP)shimmers.push({born:mc,ri:4+(Math.random()<0.5?0:1),ang:Math.random()*Math.PI*2,amp:P.shimA});}
  }
  function raw(now){const pad=0.30+0.05*Math.sin(now*0.5);let bass=0.05,mid=pad,high=0.03;
    for(const e of events){const a=now-e.start;if(a<0||a>e.dur)continue;const env=a<0.02?a/0.02:Math.exp(-(a-0.02)/(e.dur*0.4));
      if(e.band==="bass")bass+=e.peak*env;else if(e.band==="mid")mid+=e.peak*env;else high+=e.peak*env;}
    events=events.filter(e=>now-e.start<e.dur+0.1);return {bass:Math.min(1,bass),mid:Math.min(1,mid),high:Math.min(1,high)};}
  function feats(dt){const r=raw(mc);fluxV*=Math.exp(-dt/0.5);
    const up=(o,v,ua,da)=>o+(v-o)*(v>o?ua:da);
    F.bass=up(F.bass,r.bass,0.5,0.12);F.mid=up(F.mid,r.mid,0.45,0.12);F.high=up(F.high,r.high,0.6,0.16);
    F.flux=up(F.flux,Math.min(1,fluxV),0.4,0.1);
    const e=Math.min(1,F.bass*0.5+F.mid*0.35+F.high*0.25);F.energy=e;F.section=up(F.section,e,0.02,0.012);
    F.centroid=up(F.centroid,Math.min(1,(F.mid*0.4+F.high*0.9)/(F.bass*0.9+0.3)),0.2,0.05);return F;}

  const Wt={eq:0.5,int:0.5,sp:0}; let wavePhase=0,rot=0;
  function compute(f,t,dt){
    const mA=Math.sin(t*2*Math.PI/70),mB=Math.sin(t*2*Math.PI/113+1.3);
    const openness=lerp(0.55,1.0,f.section), baseTemp=(0.9+0.22*(mA*0.5+0.5)+f.centroid*0.28)*P.tempBias, k=7+2.5*(mB*0.5+0.5);
    wavePhase+=dt*(0.35+f.energy*0.35);
    // breathing pulse floor (shared resting state)
    const breath=0.5+0.5*Math.sin(t*2*Math.PI/7);
    const floorBase=between?0.16:0.08, floorSwing=between?0.10:0.045;
    const restTemp=0.72;
    // journey weights
    const cyc=t*2*Math.PI/P.period;
    let tq=Math.max(0,Math.cos(cyc))+f.bass*0.5, ti=Math.max(0,Math.cos(cyc-Math.PI))+f.mid*0.5, ts=0;
    if(P.spiral) ts=Math.max(0,f.flux*0.6+f.high*0.2)*Math.max(0,Math.sin(cyc*0.5));
    const sum=tq+ti+ts||1;tq/=sum;ti/=sum;ts/=sum;const wr=1-Math.exp(-0.6*dt);
    Wt.eq+=(tq-Wt.eq)*wr;Wt.int+=(ti-Wt.int)*wr;Wt.sp+=(ts-Wt.sp)*wr;
    rot+=dt*(0.1+f.mid*0.25)*(Wt.sp*2.0);
    blooms=blooms.filter(b=>t-b.born<1.6);ripples=ripples.filter(r=>t-r.born<1.2);shimmers=shimmers.filter(s=>t-s.born<1.3);
    for(let i=0;i<NEL;i++){const e=el[i],rf=e.rf,ang=e.ang;
      const floorGlow=(floorBase+breath*floorSwing)*(0.9+rf*0.1);
      if(between){target[i]=floorGlow;temp[i]=restTemp;continue;}
      let bandV;if(rf<0.35)bandV=f.bass*0.9;else if(rf<0.66)bandV=f.mid*0.92;else bandV=f.high;
      const eqv=(0.04+bandV*openness)*(0.9+0.1*Math.sin(ang*3));
      const iv=0.04+Math.abs(Math.sin(k*ang)*Math.cos(wavePhase+e.ri*0.4))*(0.3+f.bass*0.7);
      const phi=rot+e.ri*0.6, sv=0.04+angG(ang-phi,0.5)*(0.4+f.mid*0.5)*openness;
      let jv=Wt.eq*eqv+Wt.int*iv+Wt.sp*sv;
      // accents
      let acc=0;
      for(const b of blooms){const a=t-b.born;if(a<1.5){const front=a*1.0;acc=Math.max(acc,b.amp*Math.exp(-Math.pow((rf-front)/0.14,2))*Math.exp(-a/0.9));}}
      for(const r of ripples){const a=t-r.born;if(a<1.1){const front=a*1.6;acc=Math.max(acc,r.amp*Math.exp(-Math.pow((rf-front)/0.09,2))*Math.exp(-a/0.6));}}
      for(const s of shimmers){if(e.ri===s.ri){const a=t-s.born;if(a<1.2)acc=Math.max(acc,s.amp*angG(ang-s.ang,0.4)*Math.exp(-a/0.7));}}
      target[i]=Math.min(1,Math.max(floorGlow,jv+acc*0.95));temp[i]=baseTemp*(0.85+rf*0.35);}
    return {leading:Wt.eq>=Wt.int&&Wt.eq>=Wt.sp?"eq":(Wt.int>=Wt.sp?"interference":"spiral")};
  }

  let ctx,W,H,cx,cy,maxR;
  function shape(type,x,y,r,ang,color,a){ctx.fillStyle=rgb(color,a);
    if(type==="dot"||type==="core"){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
    else if(type==="petal"){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.beginPath();ctx.ellipse(0,0,r*0.55,r,0,0,Math.PI*2);ctx.fill();ctx.restore();}
    else if(type==="diamond"){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.7,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.7,0);ctx.closePath();ctx.fill();ctx.restore();}
    else{ctx.save();ctx.translate(x,y);ctx.rotate(ang+Math.PI/2);ctx.beginPath();ctx.ellipse(0,0,r*0.4,r,0,0,Math.PI*2);ctx.fill();ctx.restore();}}
  function render(){
    ctx.globalCompositeOperation="source-over";ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#080605";ctx.beginPath();ctx.arc(cx,cy,maxR*1.06,0,Math.PI*2);ctx.fill();
    const ceil=P.ceiling;
    ctx.globalCompositeOperation="lighter";
    const rAvg=new Float32Array(R),cnt=new Float32Array(R);
    for(let i=0;i<NEL;i++){rAvg[el[i].ri]+=vals[i];cnt[el[i].ri]++;}
    for(let ri=1;ri<R;ri++){const av=(cnt[ri]?rAvg[ri]/cnt[ri]:0)*ceil;if(av<0.05)continue;const rr=rings[ri].rf*maxR,c=warm(0.4+av*0.5,1);
      const g=ctx.createRadialGradient(cx,cy,Math.max(0,rr-maxR*0.08),cx,cy,rr+maxR*0.08);
      g.addColorStop(0,rgb(c,0));g.addColorStop(0.5,rgb(c,0.10*av));g.addColorStop(1,rgb(c,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,rr+maxR*0.08,0,Math.PI*2);ctx.fill();}
    for(let i=0;i<NEL;i++){const v=Math.min(1,vals[i]*ceil);if(v<0.05)continue;const e=el[i],r=e.rf*maxR,x=cx+Math.cos(e.ang)*r,y=cy+Math.sin(e.ang)*r,sz=e.size*maxR,c=warm(0.3+v*0.62,temp[i]);
      const gr=sz*(1.6+v*1.4),g=ctx.createRadialGradient(x,y,0,x,y,gr);
      g.addColorStop(0,rgb(c,Math.min(0.85,0.3+v*0.6)));g.addColorStop(0.45,rgb(c,Math.min(0.5,v*0.4)));g.addColorStop(1,rgb(c,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,gr,0,Math.PI*2);ctx.fill();
      shape(e.type,x,y,sz*(0.7+v*0.3),e.ang,warm(0.5+v*0.5,temp[i]),Math.min(0.95,0.35+v*0.6));}
    ctx.globalCompositeOperation="source-over";
  }

  const cv=document.getElementById("cv"),cap=document.getElementById("cap");
  const bSolo=document.getElementById("pSolo"),bGather=document.getElementById("pGather"),bBetween=document.getElementById("between");
  function setPreset(k){P=PRESETS[k];bSolo.classList.toggle("on",k==="solo");bGather.classList.toggle("on",k==="gather");}
  bSolo.onclick=()=>setPreset("solo");bGather.onclick=()=>setPreset("gather");
  bBetween.onclick=()=>{between=!between;bBetween.classList.toggle("on",between);};
  const dpr=Math.min(window.devicePixelRatio||1,2);
  function size(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx=cv.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);cx=W/2;cy=H/2;maxR=Math.min(W,H)*0.46;}
  window.addEventListener("resize",()=>{clearTimeout(window.__r);window.__r=setTimeout(size,150)});

  let prev=performance.now();
  function loop(now){const t=now/1000,dt=Math.min(0.05,(now-prev)/1000);prev=now;
    if(!between){mc+=dt;while(mc>=nextBeat){onBeat(bi);bi++;nextBeat+=beatDur;}}
    const f=feats(dt);const j=compute(f,t,dt);
    for(let i=0;i<NEL;i++){const k=target[i]>vals[i]?P.atk:P.dec;vals[i]+=(target[i]-vals[i])*(1-Math.exp(-k*dt));}
    render();cap.textContent=(P.name)+" · "+(between?"breathing":j.leading+" leading");
    if(!reduce)requestAnimationFrame(loop);
  }
  function start(){size();if(reduce){const f=feats(0.4);compute(f,2,0.4);for(let i=0;i<NEL;i++)vals[i]=target[i];render();}else requestAnimationFrame(loop);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(start);setTimeout(start,350);}else start();
})();
</script>
</body>
</html>
