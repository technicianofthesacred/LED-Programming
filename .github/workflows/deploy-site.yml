name: Deploy site (manual)

# Publishes the Studio to Cloudflare Pages (led.mandalacodes.com). Manual only —
# you press "Run workflow" when you want to go live, after the firmware binary is
# current (see the Build firmware binary workflow). Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   - a Cloudflare API token with Pages: Edit
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
# Add them under Settings -> Secrets and variables -> Actions.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Require Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Add repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to enable deploy."
            exit 1
          fi

      - name: Install dependencies
        working-directory: lightweaver
        run: npm ci

      - name: Build and deploy to Cloudflare Pages
        working-directory: lightweaver
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:pages
