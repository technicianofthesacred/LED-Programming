name: Deploy site

# Publishes THIS repo's Studio bundle to PRODUCTION at led.mandalacodes.com.
#
# Deploy ownership (updated 2026-07-13, see docs/led-mandalacodes-setup.md):
# led.mandalacodes.com is the custom domain on the `lightweaver` Cloudflare
# Pages project, whose production branch is `main`. `npm run deploy:pages`
# stages this repo's Studio (Show screen included) with `/` → `/design/` and
# deploys it to `--branch main`, i.e. the live domain. So a push to this repo's
# main IS the live deploy — there is no separate mandalacodes step for the LED
# surface. (mandalacodes.com itself stays a different project; it must NOT also
# publish to `lightweaver`, or the two would overwrite each other.)
#
# GATE: this only actually publishes when the two Cloudflare secrets below are
# set on THIS repo. Until then the deploy step skips cleanly and nothing reaches
# the live domain — that is the one switch to flip to make pushes go live.
#
# Runs automatically on every push to main that touches the deployable surface
# (the lightweaver/ app, including the firmware binary it serves), and manually
# via "Run workflow". Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   - a Cloudflare API token with Pages: Edit
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
# Add them under Settings -> Secrets and variables -> Actions.
#
# Until those secrets exist, a push-triggered DEPLOY skips cleanly (green, with
# a notice) so it never reddens main; a HUMAN manual run fails loudly so you
# know why. Dispatches from build-firmware.yml pass source=ci and skip cleanly
# like push runs — otherwise every firmware rebuild would redden CI until the
# Cloudflare secrets are configured.
#
# The `test` job is NOT gated on those secrets: it reuses the standalone Tests
# workflow (.github/workflows/test.yml, via workflow_call) on every trigger of
# this workflow, and the deploy job hard-depends on it. (Before 2026-07-09,
# tests only ran when the Cloudflare secrets were present — a push could go
# green having run zero tests.) Pushes and PRs on other branches get the same
# gate from test.yml's own push/pull_request triggers.

on:
  workflow_dispatch:
    inputs:
      source:
        description: Set to "ci" by build-firmware.yml; leave as "manual" for human runs
        required: false
        default: manual
  push:
    branches:
      - main
    paths:
      - 'lightweaver/**'
      - '.github/workflows/deploy-site.yml'

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  # Always-on test gate — runs regardless of Cloudflare secrets, so this
  # workflow can never go green without having run the tests. Reuses the
  # standalone Tests workflow so the gate (fetch-depth: 0 for the
  # factory-bin-freshness history walk, npm ci, launch:check) is defined once.
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not set — skipping deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to enable automatic publishing."
            # Fail loudly only for a HUMAN manual run; CI dispatches
            # (build-firmware passes source=ci) skip cleanly like push runs.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.source || 'manual' }}" != "ci" ]; then
              echo "::error::Manual deploy requested but Cloudflare secrets are missing."
              exit 1
            fi
          fi

      - name: Install dependencies
        if: steps.creds.outputs.enabled == 'true'
        working-directory: lightweaver
        run: |
          # `npm ci` installs exactly what lightweaver/package-lock.json pins,
          # for reproducible builds (vs `npm install`, which can drift the tree).
          npm ci
          # Workaround for npm/cli#4828: npm may skip the platform-specific
          # Rollup native binding on fresh installs, breaking `vite build`.
          node scripts/ensure-rollup-native.mjs

      # Core tests already ran (and passed) in the required `test` job above —
      # no secrets-gated re-run here.
      - name: Build and deploy to Cloudflare Pages
        if: steps.creds.outputs.enabled == 'true'
        working-directory: lightweaver
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:pages
