<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lightweaver v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .lw-file-fallback {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      font-family: 'General Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1814;
      color: #f4f1ea;
    }
    .lw-file-fallback > div {
      width: min(620px, 100%);
      display: grid;
      gap: 16px;
    }
    .lw-file-fallback h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 52px);
      font-weight: 520;
      letter-spacing: 0;
    }
    .lw-file-fallback p {
      margin: 0;
      color: #b9b4aa;
      line-height: 1.55;
    }
    .lw-file-fallback a {
      color: #f0b35a;
    }
    .lw-file-fallback code {
      display: block;
      overflow-x: auto;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      color: #e9e3d6;
      background: rgba(255, 255, 255, 0.06);
      font-family: "Spline Sans Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    if (window.location.protocol === 'file:') {
      window.addEventListener('DOMContentLoaded', function () {
        var root = document.getElementById('root');
        root.innerHTML = '<main class="lw-file-fallback"><div><h1>Open Lightweaver Studio v3</h1><p>This source file needs a web server. The hosted Studio creates chip configs; the card page runs locally.</p><p><a href="https://led.mandalacodes.com/design/#screen=patterns">Open the live Studio</a></p><code>cd "/Users/adrianrasmussen/Documents/Files/2 Areas/Coding/led/lightweaver"\nnpm run dev</code><p>Then open <a href="http://localhost:5173/#screen=patterns">localhost:5173</a>.</p></div></main>';
      });
    }
  </script>
  <script type="module">
    if (window.location.protocol !== 'file:') {
      import('/src/main.jsx');
    }
  </script>
</body>
</html>
