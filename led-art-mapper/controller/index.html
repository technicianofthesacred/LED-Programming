<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED Controller</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Full-screen visualization canvas -->
  <canvas id="main-canvas"></canvas>

  <!-- Top bar — connection, mode toggle. Auto-hides on idle. -->
  <div class="top-bar" id="top-bar">
    <div class="app-wordmark">LED Controller</div>

    <div class="view-toggle">
      <button class="toggle-btn active" id="btn-local" title="Visualize patterns locally">Local</button>
      <button class="toggle-btn"        id="btn-live"  title="Mirror live WLED output">Live</button>
    </div>

    <div class="conn-widget">
      <span class="conn-dot" id="conn-dot"></span>
      <input type="text" id="wled-ip" value="" spellcheck="false"
             placeholder="WLED IP" title="WLED device IP address" />
      <button id="btn-scan" title="Auto-detect WLED on this network">Scan</button>
      <button id="btn-connect">Connect</button>
    </div>

    <!-- Scan results dropdown -->
    <div id="scan-results" class="scan-results hidden"></div>
  </div>

  <!-- Drop-zone overlay — shown until ledmap is loaded -->
  <div class="drop-overlay" id="drop-overlay">
    <div class="drop-content">
      <div class="drop-icon">◎</div>
      <h2>Drop your <code>ledmap.json</code></h2>
      <p>Exported from LED Art Mapper — defines the 2D position of every LED</p>
      <button id="btn-browse">Browse files</button>
      <input type="file" id="ledmap-input" accept=".json" hidden />
      <p class="hint" style="margin-top:24px">Or press <kbd>L</kbd> to load at any time</p>
    </div>
  </div>

  <!-- Control bar — always visible at bottom -->
  <div class="control-bar" id="control-bar">

    <!-- Quick sliders -->
    <div class="quick-sliders">
      <label class="slider-row" title="Brightness (sent to WLED)">
        <span class="slider-label">BRI</span>
        <input type="range" id="sl-bri" min="0" max="255" value="200" />
        <span class="slider-val" id="val-bri">200</span>
      </label>
      <label class="slider-row" title="Effect speed (sent to WLED)">
        <span class="slider-label">SPD</span>
        <input type="range" id="sl-spd" min="0" max="255" value="128" />
        <span class="slider-val" id="val-spd">128</span>
      </label>
      <label class="slider-row" title="Effect intensity (sent to WLED)">
        <span class="slider-label">INT</span>
        <input type="range" id="sl-int" min="0" max="255" value="128" />
        <span class="slider-val" id="val-int">128</span>
      </label>
    </div>

    <!-- Scene cards — generated by JS -->
    <div class="scenes-row" id="scenes-row"></div>

    <!-- Bar actions -->
    <div class="bar-actions">
      <button class="bar-btn" id="btn-load-map" title="Load ledmap.json (L)">
        <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
          <path d="M2 3a1 1 0 0 1 1-1h4l2 2h4a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3z"/>
        </svg>
      </button>
      <input type="file" id="ledmap-input-bar" accept=".json" hidden />
    </div>

  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
